name: Update VBS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4  # Updated to v4
    - name: Update VBS
      run: |
        links=("https://link1.com/dodu" "https://link2.com/dodu" "https://link3.com/dodu")
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 3))
        current_link=${links[$link_index]}
        sed "s/%%CURRENT_LINK%%/$current_link/" installer.vbs.template > installer.vbs
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add installer.vbs
        git commit -m "Update VBS" || exit 0
        git push
