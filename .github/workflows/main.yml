name: Update VBS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Create test file
      run: |
        echo "Test file created at $(date)" > test.txt
        echo "Current minute: $(date +%M)"
        echo "Current link index: $(( $(date +%M) / 10 % 3 ))"
